<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact TURN - Get in touch with us">
    <title>Contact - Turn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=1737053200">
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        .contact-page {
            min-height: 100vh;
            background-color: #ffffff;
        }
        
        .contact-hero {
            padding-top: 2rem; /* Even more reduced */
            padding-bottom: 8rem; /* pb-32 equivalent */
        }
        
        .contact-container {
            max-width: 36rem; /* max-w-xl equivalent */
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        .contact-heading {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 700;
            line-height: 1.1;
            color: var(--text-dark);
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .contact-subtitle {
            font-family: var(--font-sans);
            font-size: 1rem;
            line-height: 1.5;
            color: #666666;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        @media (min-width: 640px) {
            .contact-container {
                padding: 0 1.5rem;
            }
            .contact-subtitle {
                font-size: 1.125rem;
            }
        }
        
        @media (min-width: 1024px) {
            .contact-container {
                padding: 0 2rem;
            }
        }
        
        .contact-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 2rem;
        }
        
        @media (min-width: 640px) {
            .contact-card {
                padding: 2.5rem;
            }
        }
        
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-label {
            font-family: var(--font-sans);
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
        }
        
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #F3F4F6;
            border: 1px solid #E5E7EB;
            border-radius: 0.5rem;
            font-family: var(--font-sans);
            font-size: 1rem;
            color: #111827;
            transition: all 0.2s ease;
            outline: none;
        }
        
        .form-input::placeholder,
        .form-textarea::placeholder {
            color: #9CA3AF;
        }
        
        .form-input:focus,
        .form-textarea:focus {
            background: #F9FAFB;
            border-color: #CD6633;
            box-shadow: 0 0 0 3px rgba(205, 102, 51, 0.1);
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .form-submit {
            width: 100%;
            padding: 1rem 2rem;
            background-color: #CD6633;
            color: white;
            border: none;
            border-radius: 999px;
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .form-submit:hover {
            background-color: #B85A2A;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transform: translateY(-1px);
        }
        
        .form-submit:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <a href="index.html">turn</a>
                </div>
                <nav class="nav-links" aria-label="Site">
                    <a class="nav-link" href="index.html#home">Home</a>
                    <a class="nav-link" href="features.html">Platform</a>
                    <a class="nav-link" href="about.html">About</a>
                    <a class="nav-link" href="contact.html">Contact</a>
                </nav>
                <div class="nav-actions">
                    <a href="#" class="btn btn-primary nav-cta" data-get-demo>Get Demo</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="contact-page">
        <section class="contact-hero">
            <div class="contact-container">
                <h1 class="contact-heading">Contact Us</h1>
                <p class="contact-subtitle">Fill out the form below, and we'll get back to you.</p>
                
                <div class="contact-card">
                    <form class="contact-form" id="contactForm">
                        <div class="form-group">
                            <label for="fullName" class="form-label">Full Name</label>
                            <input
                                type="text"
                                id="fullName"
                                name="fullName"
                                placeholder="Enter first & last name"
                                class="form-input"
                                required
                            />
                        </div>
                        
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="Enter your work email"
                                class="form-input"
                                required
                            />
                        </div>
                        
                        <div class="form-group">
                            <label for="company" class="form-label">Company</label>
                            <input
                                type="text"
                                id="company"
                                name="company"
                                placeholder="Enter your company"
                                class="form-input"
                            />
                        </div>
                        
                        <div class="form-group">
                            <label for="message" class="form-label">Message</label>
                            <textarea
                                id="message"
                                name="message"
                                placeholder="Type your message..."
                                rows="6"
                                class="form-textarea"
                            ></textarea>
                        </div>
                        
                        <button type="submit" class="form-submit">Send Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-content">
                <div class="footer-logo">
                    <a href="index.html">turn</a>
                </div>
                
                <div class="footer-social">
                    <a href="#" class="social-link" aria-label="Instagram">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
                        </svg>
                    </a>
                    <a href="#" class="social-link" aria-label="LinkedIn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
                            <line x1="6.5" y1="10" x2="6.5" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M10 18V10h2.5v1c.7-1 1.8-1 2.5-1 2 0 2.5 1.5 2.5 3v5h-2.5v-4.5c0-1 0-1.5-1-1.5s-1 .5-1 1.5V18H10z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        </svg>
                    </a>
                    <a href="#" class="social-link" aria-label="Twitter">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 4s-7 4-13 4c-2 0-4-1-4-1M2 4s7 4 13 4c2 0 4-1 4-1M2 4l9 11M22 4l-9 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </a>
                    <a href="#" class="social-link" aria-label="YouTube">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="2" y="6" width="20" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M10 10l4 2-4 2v-4z" fill="currentColor"/>
                        </svg>
                    </a>
                </div>
            </div>
            
            <nav class="footer-nav">
                <a href="index.html#home" class="footer-link">Home</a>
                <a href="about.html" class="footer-link">About</a>
                <a href="contact.html" class="footer-link">Contact</a>
            </nav>
            
            <div class="footer-copyright">
                <p>&copy; 2024 Turn. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Get Demo Page (formerly Join Waitlist) -->
    <div class="join-waitlist-page" id="joinWaitlistPage" aria-hidden="true">
        <div class="join-waitlist-content">
            <h1 class="join-waitlist-title">Get Demo</h1>
            <p class="join-waitlist-subtitle">Fill out the form below to request a demo, and we'll get back to you.</p>
            
            <form class="join-waitlist-form" id="joinWaitlistForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter first & last name" required class="join-waitlist-input">
                </div>
                
                <div class="form-group">
                    <label for="emailAddress">Email Address</label>
                    <input type="email" id="emailAddress" name="emailAddress" placeholder="Enter your work email" required class="join-waitlist-input">
                </div>
                
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Enter your phone number" class="join-waitlist-input">
                </div>
                
                <div class="form-group">
                    <label for="company">Company</label>
                    <input type="text" id="company" name="company" placeholder="Enter your company" class="join-waitlist-input">
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type your message..." rows="4" class="join-waitlist-textarea"></textarea>
                </div>
                
                <button type="submit" class="join-waitlist-submit">Request Demo</button>
            </form>
            
            <div class="join-waitlist-footer-line"></div>
        </div>
    </div>

    <script src="/supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/script.js"></script>
</body>
</html>
